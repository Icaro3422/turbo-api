version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: turbo_notes_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://turbo_user:turbo_password@postgres:5432/turbo_notes
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1
    depends_on:
      postgres:
        condition: service_healthy
    command: pipenv run python manage.py runserver 0.0.0.0:8000

  postgres:
    image: postgres:15-alpine
    container_name: turbo_notes_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=turbo_notes
      - POSTGRES_USER=turbo_user
      - POSTGRES_PASSWORD=turbo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbo_user -d turbo_notes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
